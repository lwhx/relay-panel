# ============================================================================
# RelayPanel deployment
#
# BEFORE FIRST `docker compose up`:
#   1. Generate secrets:
#        openssl rand -hex 32     # -> JWT_SECRET
#        openssl rand -hex 16     # -> PANEL_KEY
#   2. Fill them in below (or use a .env file / secrets manager).
#   3. Create an inbound device group in the panel UI and copy its Node Token
#      into NODE_TOKEN for the node service.
#   4. Change the default admin password (admin/admin123) after first login.
#
# The panel REFUSES TO START if JWT_SECRET is empty or the placeholder.
# ============================================================================

services:
  panel:
    build:
      context: .
      target: panel
    image: relaypanel/panel:latest
    ports:
      # RELAYPANEL_WEB_MODE controls how the panel port is published:
      #   direct         → 0.0.0.0:18888:18888  (public, default)
      #   reverse-proxy  → 127.0.0.1:18888:18888 (localhost only, external proxy)
      #   caddy          → 127.0.0.1:18888:18888 (localhost only, Caddy handles TLS)
      - "${RELAYPANEL_PANEL_PORT_BINDING:-0.0.0.0:18888}:18888"
    environment:
      # v0.4.3: DATABASE_URL is the canonical driver.  Supports SQLite and
      # PostgreSQL.  Defaults to SQLite for one-click compatibility.
      - DATABASE_URL=${DATABASE_URL:-sqlite:/app/data/data.db?mode=rwc}
      - LISTEN=0.0.0.0:18888
      - PUBLIC_DIR=/app/public
      # REQUIRED — generate with: openssl rand -hex 32
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set (see header comment)}
      # REQUIRED — generate with: openssl rand -hex 16
      - PANEL_KEY=${PANEL_KEY:?PANEL_KEY must be set (see header comment)}
      # OPTIONAL — the public URL nodes should use to reach the panel.
      # Set this when the panel is behind a reverse proxy / domain, so the
      # "Copy Install Command" button emits e.g. https://panel.example.com
      # instead of whatever URL the admin's browser happened to be on.
      # Leave empty to fall back to the browser's window.location.origin.
      # Example: - PUBLIC_PANEL_URL=https://panel.example.com
      - PUBLIC_PANEL_URL=${PUBLIC_PANEL_URL:-}
      # v0.4.19 — node-level GeoIP is now ON by default. The panel resolves
      # each node's public IP to a country flag via built-in providers
      # (primary ipinfo.io Lite → fallback ipwho.is). Failures degrade to
      # "unknown" and never affect node status or forwarding.
      # Results cache for GEOIP_CACHE_TTL seconds (default 7 days). To opt OUT
      # set GEOIP_ENABLED=false in .env. See docs/DEPLOYMENT.md (privacy note).
      - GEOIP_ENABLED=${GEOIP_ENABLED:-true}
      - GEOIP_CACHE_TTL=${GEOIP_CACHE_TTL:-604800}
    volumes:
      - panel_data:/app/data
    restart: unless-stopped

  node:
    build:
      context: .
      target: node
    image: relaypanel/node:latest
    # Node is opt-in via --profile node. Most deployments run relay-node on a
    # separate server. To also run node on this host:
    #   docker compose --profile node up -d
    #   (or: RELAYPANEL_WITH_NODE=1 ./deploy.sh)
    profiles:
      - node
    # host network so the node can open its forwarding listen ports directly.
    # On a dedicated forwarding box, this is the simplest correct setup.
    network_mode: host
    environment:
      - PANEL_URL=http://127.0.0.1:18888
      # Set to a real inbound group token created in the panel UI. The node
      # refuses to start with an unset or "default-token" value.
      - NODE_TOKEN=${NODE_TOKEN:?NODE_TOKEN must be set to a real inbound-group token from the panel UI}
      - POLL_INTERVAL=10
    restart: unless-stopped
    depends_on:
      - panel

  # Optional: Caddy reverse proxy for TLS + custom domain.
  # Enable with --profile caddy and set RELAYPANEL_DOMAIN in .env.
  # Caddy auto-issues a Let's Encrypt certificate on first start.
  caddy:
    image: caddy:2-alpine
    profiles:
      - caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - RELAYPANEL_DOMAIN=${RELAYPANEL_DOMAIN:-}
      - ACME_EMAIL=${ACME_EMAIL:-}
      - CADDY_ACME_EMAIL_DIRECTIVE=${CADDY_ACME_EMAIL_DIRECTIVE:-}
    restart: unless-stopped
    depends_on:
      - panel

  # Optional: PostgreSQL backend (v0.4.3).  Only started when the postgres
  # profile is enabled.  The panel reads DATABASE_URL to decide the backend.
  # Usage:
  #   docker compose --profile postgres up -d
  #   # or: RELAYPANEL_DB_MODE=embedded-postgres ./deploy.sh
  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-relaypanel}
      - POSTGRES_USER=${POSTGRES_USER:-relaypanel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-relaypanel} -d ${POSTGRES_DB:-relaypanel}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  panel_data:
  postgres_data:
  caddy_data:
  caddy_config:
