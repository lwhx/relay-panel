name: Binary Release

# Builds relay-node static (musl + rustls) binaries for amd64 + arm64
# and uploads them as GitHub Release assets. Triggered by version tags (v*)
# alongside docker-release.yml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.4), without v prefix'
        required: true
        default: '0.1.4'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-unknown-linux-musl
            asset_name: relay-node-linux-amd64
          - rust_target: aarch64-unknown-linux-musl
            asset_name: relay-node-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup show
          rustup target add ${{ matrix.rust_target }}

      - name: Install musl tools (amd64)
        if: matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compiler
        if: matrix.rust_target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            musl-tools
          # musl-tools provides musl-gcc for amd64; for arm64 we need the
          # cross toolchain. Create a musl wrapper that uses the arm64 gcc.
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc /usr/bin/musl-gcc-aarch64 || true

      - name: Build relay-node (static musl)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_musl: aarch64-linux-gnu-g++
        run: |
          cargo build --release --target ${{ matrix.rust_target }} -p relay-node

      - name: Rename binary
        run: |
          cp target/${{ matrix.rust_target }}/release/relay-node ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
          file ${{ matrix.asset_name }}
          ls -lh ${{ matrix.asset_name }}

      - name: Generate SHA256 checksum
        run: |
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          echo "----- checksum -----"
          cat ${{ matrix.asset_name }}.sha256

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release body from CHANGELOG
        id: body
        run: |
          # Extract ONLY this version's section. The script exits non-zero if
          # the section is missing or empty, which fails the job — we must never
          # publish a release with body=null (the dashboard "view changelog"
          # would render blank). See scripts/extract-changelog.sh.
          if ! bash scripts/extract-changelog.sh "${{ steps.ver.outputs.version }}" > RELEASE_BODY.md; then
            echo "::error::No non-empty CHANGELOG section for ${{ steps.ver.outputs.version }} — refusing to publish an empty release body."
            exit 1
          fi
          echo "----- release body preview -----"
          cat RELEASE_BODY.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.ver.outputs.version) }}
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          prerelease: true
          name: ${{ github.ref_name || format('v{0}', steps.ver.outputs.version) }}
          body_path: RELEASE_BODY.md

  # Post-release verification: download each asset, verify its checksum, and
  # confirm the binary actually runs and reports the expected version. Catches
  # truncated uploads, wrong-arch binaries, and version/tag mismatches that a
  # green build job alone can't detect.
  verify:
    name: Verify release assets
    needs: build-and-upload
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download + checksum-verify amd64 asset
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          gh release download "$TAG" --pattern "relay-node-linux-amd64*" --dir dl
          cd dl
          # Confirm the asset is intact (re-run the published sha256).
          sha256sum -c relay-node-linux-amd64.sha256
          # Confirm it's a valid ELF, not a truncated/HTML error page.
          file relay-node-linux-amd64 | grep -q "ELF"

      - name: Verify Docker image version matches tag
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # docker-release.yml builds and pushes on the same tag in parallel.
          # Retry the pull a few times in case the image job is still pushing.
          for i in 1 2 3 4 5; do
            docker pull ghcr.io/moeshinx/relay-panel-node:"$VERSION" && break
            echo "image not ready yet, retrying in 30s ($i/5)…"
            sleep 30
          done
          OUT=$(docker run --rm ghcr.io/moeshinx/relay-panel-node:"$VERSION" --version)
          echo "image reports: $OUT"
          # The version constant is baked at compile time, so this catches a
          # release built from a branch where Cargo.toml wasn't bumped.
          echo "$OUT" | grep -q "$VERSION" || { echo "::error::image version does not match tag $VERSION"; exit 1; }
