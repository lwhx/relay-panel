name: Script Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: bash syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n
        run: |
          scripts=()
          for file in install.sh deploy.sh scripts/*.sh; do
            [ -s "$file" ] && scripts+=("$file")
          done
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No non-empty shell scripts to check."
            exit 0
          fi
          bash -n "${scripts[@]}"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          scripts=()
          for file in install.sh deploy.sh scripts/*.sh; do
            [ -s "$file" ] && scripts+=("$file")
          done
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No non-empty shell scripts to check."
            exit 0
          fi
          shellcheck --severity=error "${scripts[@]}"
